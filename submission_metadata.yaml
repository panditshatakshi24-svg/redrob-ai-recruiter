methodology_summary: >
  Built a hybrid AI candidate ranking system combining feature engineering
  and semantic search using Sentence Transformers (BAAI/bge-small-en-v1.5).
  Candidates are first ranked using handcrafted feature scores and then
  semantically re-ranked using cosine similarity. The system produces the
  top 100 ranked candidates with explainable reasoning and runs entirely
  on CPU without external API calls during ranking.